version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  eureka:
    build: ../eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  config-server:
    build: ../config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      eureka:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka:8761/eureka/

  api-gateway:
    build: ../api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka
      - config-server
    environment:
      EUREKA_URL: http://eureka:8761/eureka/
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  # ── Databases ───────────────────────────────────────────────────────────────
  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql/data

  admin-db:
    image: postgres:16-alpine
    container_name: admin-db
    environment:
      POSTGRES_DB: admin_db
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
    ports:
      - "5434:5432"
    volumes:
      - admin_data:/var/lib/postgresql/data

  product-db:
    image: postgres:16-alpine
    container_name: product-db
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
    ports:
      - "5435:5432"
    volumes:
      - product_data:/var/lib/postgresql/data

  wishlist-db:
    image: postgres:16-alpine
    container_name: wishlist-db
    environment:
      POSTGRES_DB: wishlist_db
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
    ports:
      - "5436:5432"
    volumes:
      - wishlist_data:/var/lib/postgresql/data

  customer-db:
    image: postgres:16-alpine
    container_name: customer-db
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
    ports:
      - "5437:5432"
    volumes:
      - customer_data:/var/lib/postgresql/data

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
    ports:
      - "5438:5432"
    volumes:
      - order_data:/var/lib/postgresql/data

  feedback-db:
    image: postgres:16-alpine
    container_name: feedback-db
    environment:
      POSTGRES_DB: feedback_db
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
    ports:
      - "5439:5432"
    volumes:
      - feedback_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ── Microservices ────────────────────────────────────────────────────────────
  user-service:
    build: ../services/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - user-db
      - eureka
      - kafka
    environment:
      DB_USER: bookstore
      DB_PASS: bookstore123
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      EUREKA_URL: http://eureka:8761/eureka/
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  admin-service:
    build: ../services/admin-service
    container_name: admin-service
    ports:
      - "8082:8082"
    depends_on:
      - admin-db
      - eureka
    environment:
      DB_USER: bookstore
      DB_PASS: bookstore123
      SPRING_DATASOURCE_URL: jdbc:postgresql://admin-db:5432/admin_db
      EUREKA_URL: http://eureka:8761/eureka/
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  product-service:
    build: ../services/product-service
    container_name: product-service
    ports:
      - "8083:8083"
    depends_on:
      - product-db
      - eureka
    environment:
      DB_USER: bookstore
      DB_PASS: bookstore123
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/product_db
      EUREKA_URL: http://eureka:8761/eureka/
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  cart-service:
    build: ../services/cart-service
    container_name: cart-service
    ports:
      - "8084:8084"
    depends_on:
      - redis
      - eureka
    environment:
      REDIS_HOST: redis
      EUREKA_URL: http://eureka:8761/eureka/
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  wishlist-service:
    build: ../services/wishlist-service
    container_name: wishlist-service
    ports:
      - "8085:8085"
    depends_on:
      - wishlist-db
      - eureka
    environment:
      DB_USER: bookstore
      DB_PASS: bookstore123
      SPRING_DATASOURCE_URL: jdbc:postgresql://wishlist-db:5432/wishlist_db
      EUREKA_URL: http://eureka:8761/eureka/
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  customer-service:
    build: ../services/customer-service
    container_name: customer-service
    ports:
      - "8086:8086"
    depends_on:
      - customer-db
      - eureka
    environment:
      DB_USER: bookstore
      DB_PASS: bookstore123
      SPRING_DATASOURCE_URL: jdbc:postgresql://customer-db:5432/customer_db
      EUREKA_URL: http://eureka:8761/eureka/
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  order-service:
    build: ../services/order-service
    container_name: order-service
    ports:
      - "8087:8087"
    depends_on:
      - order-db
      - eureka
      - kafka
    environment:
      DB_USER: bookstore
      DB_PASS: bookstore123
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      EUREKA_URL: http://eureka:8761/eureka/
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  feedback-service:
    build: ../services/feedback-service
    container_name: feedback-service
    ports:
      - "8088:8088"
    depends_on:
      - feedback-db
      - eureka
    environment:
      DB_USER: bookstore
      DB_PASS: bookstore123
      SPRING_DATASOURCE_URL: jdbc:postgresql://feedback-db:5432/feedback_db
      EUREKA_URL: http://eureka:8761/eureka/
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: bookstore-super-secret-key-for-jwt-authentication-2024

  notification-service:
    build: ../services/notification-service
    container_name: notification-service
    ports:
      - "8089:8089"
    depends_on:
      - eureka
      - kafka
    environment:
      EUREKA_URL: http://eureka:8761/eureka/
      KAFKA_SERVERS: kafka:29092

volumes:
  user_data:
  admin_data:
  product_data:
  wishlist_data:
  customer_data:
  order_data:
  feedback_data:
  redis_data: